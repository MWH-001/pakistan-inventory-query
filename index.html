<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Query System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .password-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        
        .password-box {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        
        .password-box h2 {
            margin-bottom: 20px;
            color: #333;
        }
        
        .password-box input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 15px;
        }
        
        .password-box button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .password-box button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .password-error {
            color: #e74c3c;
            margin-top: 10px;
            display: none;
        }
        
        .main-content {
            display: none;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 1.1em;
        }
        
        .search-card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }
        
        .search-form {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: flex-end;
        }
        
        .form-group {
            flex: 1;
            min-width: 200px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .search-btn {
            padding: 12px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .search-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .result-card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: none;
        }
        
        .result-card.show {
            display: block;
        }
        
        .summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .summary-item {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        
        .summary-item .label {
            color: #666;
            font-size: 14px;
            margin-bottom: 8px;
        }
        
        .summary-item .value {
            font-size: 32px;
            font-weight: bold;
            color: #333;
        }
        
        .summary-item.main .value {
            color: #667eea;
        }
        
        .summary-item.sub .value {
            color: #764ba2;
        }
        
        .summary-item.total .value {
            color: #2ecc71;
        }
        
        .table-section {
            margin-top: 20px;
        }
        
        .table-section h3 {
            margin-bottom: 15px;
            color: #333;
            font-size: 18px;
        }
        
        .table-wrapper {
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }
        
        th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }
        
        td {
            padding: 12px 15px;
            border-bottom: 1px solid #f0f0f0;
        }
        
        tr:hover {
            background: #f8f9fa;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .badge.main {
            background: #667eea;
            color: white;
        }
        
        .badge.sub {
            background: #764ba2;
            color: white;
        }
        
        .stock-good {
            color: #2ecc71;
            font-weight: 600;
        }
        
        .stock-low {
            color: #f39c12;
            font-weight: 600;
        }
        
        .stock-zero {
            color: #e74c3c;
            font-weight: 600;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .loading::after {
            content: '...';
            animation: dots 1.5s steps(5, end) infinite;
        }
        
        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60% { content: '...'; }
            80%, 100% { content: ''; }
        }
        
        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }
        
        .error.show {
            display: block;
        }
        
        .update-time {
            text-align: center;
            color: rgba(255,255,255,0.8);
            margin-top: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="password-overlay" id="passwordOverlay">
        <div class="password-box">
            <h2>🔒 Access Required</h2>
            <input type="password" id="passwordInput" placeholder="Enter password">
            <button onclick="checkPassword()">Unlock</button>
            <div class="password-error" id="passwordError">Incorrect password</div>
        </div>
    </div>
    
    <div class="main-content" id="mainContent">
    <div class="container">
        <div class="header">
            <h1>📦 Inventory Query System</h1>
            <p>Query Good stock for materials and their substitutes by warehouse</p>
        </div>
        
        <div class="search-card">
            <div class="search-form">
                <div class="form-group">
                    <label>Material Code</label>
                    <input type="text" id="materialCode" placeholder="Enter 8-digit code, e.g. 17401967">
                </div>
                <div class="form-group">
                    <label>Warehouse</label>
                    <select id="warehouse">
                        <option value="">All Warehouses</option>
                    </select>
                </div>
                <button class="search-btn" id="searchBtn">🔍 Query</button>
            </div>
            <div class="error" id="errorMsg"></div>
        </div>
        
        <div class="result-card" id="resultCard">
            <div class="summary" id="summary"></div>
            
            <div class="table-section">
                <h3>Stock Details</h3>
                <div class="table-wrapper">
                    <table id="resultTable">
                        <thead>
                            <tr>
                                <th>Material Code</th>
                                <th>Description</th>
                                <th>Warehouse</th>
                                <th>Good Stock</th>
                                <th>Type</th>
                            </tr>
                        </thead>
                        <tbody id="resultBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
        
        <div class="update-time" id="updateTime"></div>
    </div>
    </div>
    
    <script>
        const PASSWORD = "beforepouseme";
        
        function checkPassword() {
            const input = document.getElementById('passwordInput').value;
            const error = document.getElementById('passwordError');
            
            if (input === PASSWORD) {
                const today = new Date().toDateString();
                localStorage.setItem('authenticated', 'true');
                localStorage.setItem('authDate', today);
                document.getElementById('passwordOverlay').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
            } else {
                error.style.display = 'block';
                setTimeout(() => { error.style.display = 'none'; }, 3000);
            }
        }
        
        document.getElementById('passwordInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') checkPassword();
        });
        
        // Check if already authenticated today
        const authDate = localStorage.getItem('authDate');
        const today = new Date().toDateString();
        if (localStorage.getItem('authenticated') === 'true' && authDate === today) {
            document.getElementById('passwordOverlay').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
        }
        let inventoryData = null;
        let substituteData = null;
        
        // Load data
        async function loadData() {
            try {
                const [invRes, subRes] = await Promise.all([
                    fetch('inventory_index.json?t=' + Date.now()),
                    fetch('substitute_map.json?t=' + Date.now())
                ]);
                
                if (!invRes.ok || !subRes.ok) {
                    throw new Error('Failed to load data');
                }
                
                inventoryData = await invRes.json();
                substituteData = await subRes.json();
                
                // Build warehouse list (exclude Pakistan-MWH)
                const warehouses = new Set();
                Object.values(inventoryData).forEach(warehousesObj => {
                    Object.keys(warehousesObj).forEach(wh => {
                        if (!wh.includes('MWH')) {
                            warehouses.add(wh);
                        }
                    });
                });
                
                const warehouseSelect = document.getElementById('warehouse');
                Array.from(warehouses).sort().forEach(wh => {
                    const option = document.createElement('option');
                    option.value = wh;
                    option.textContent = wh;
                    warehouseSelect.appendChild(option);
                });
                
                // Show update time
                const now = new Date();
                document.getElementById('updateTime').textContent = 
                    `Last updated: ${now.toLocaleString('en-US')}`;
                
            } catch (error) {
                showError('Failed to load data. Please try again later.');
            }
        }
        
        // Search
        async function search() {
            const materialCode = document.getElementById('materialCode').value.trim();
            const warehouse = document.getElementById('warehouse').value;
            
            if (!materialCode) {
                showError('Please enter a material code');
                return;
            }
            
            hideError();
            
            const resultCard = document.getElementById('resultCard');
            const summary = document.getElementById('summary');
            const resultBody = document.getElementById('resultBody');
            
            resultCard.classList.remove('show');
            summary.innerHTML = '<div class="loading">Querying</div>';
            resultBody.innerHTML = '';
            
            await new Promise(resolve => setTimeout(resolve, 100));
            
            // Query main material
            let mainStock = 0;
            const mainResults = [];
            
            if (inventoryData[materialCode]) {
                if (warehouse) {
                    const stock = inventoryData[materialCode][warehouse]?.Good || 0;
                    mainStock = stock;
                    if (stock > 0) {
                        mainResults.push({
                            code: materialCode,
                            desc: 'Main Material',
                            warehouse: warehouse,
                            stock: stock,
                            type: 'main'
                        });
                    }
                } else {
                    Object.entries(inventoryData[materialCode]).forEach(([wh, data]) => {
                        if (wh.includes('MWH')) return; // exclude MWH
                        const stock = data.Good || 0;
                        mainStock += stock;
                        if (stock > 0) {
                            mainResults.push({
                                code: materialCode,
                                desc: 'Main Material',
                                warehouse: wh,
                                stock: stock,
                                type: 'main'
                            });
                        }
                    });
                }
            }
            
            // Query substitutes
            let subStock = 0;
            const subResults = [];
            
            if (substituteData[materialCode]) {
                for (const sub of substituteData[materialCode]) {
                    const subCode = sub.code;
                    const subDesc = sub.desc || '';
                    
                    if (inventoryData[subCode]) {
                        if (warehouse) {
                            const stock = inventoryData[subCode][warehouse]?.Good || 0;
                            subStock += stock;
                            if (stock > 0) {
                                subResults.push({
                                    code: subCode,
                                    desc: subDesc,
                                    warehouse: warehouse,
                                    stock: stock,
                                    type: 'sub'
                                });
                            }
                        } else {
                            Object.entries(inventoryData[subCode]).forEach(([wh, data]) => {
                                if (wh.includes('MWH')) return; // exclude MWH
                                const stock = data.Good || 0;
                                subStock += stock;
                                if (stock > 0) {
                                    subResults.push({
                                        code: subCode,
                                        desc: subDesc,
                                        warehouse: wh,
                                        stock: stock,
                                        type: 'sub'
                                    });
                                }
                            });
                        }
                    }
                }
            }
            
            const totalStock = mainStock + subStock;
            
            // Show summary
            summary.innerHTML = `
                <div class="summary-item main">
                    <div class="label">Main Material Stock</div>
                    <div class="value">${mainStock}</div>
                </div>
                <div class="summary-item sub">
                    <div class="label">Substitute Stock</div>
                    <div class="value">${subStock}</div>
                </div>
                <div class="summary-item total">
                    <div class="label">Total Available</div>
                    <div class="value">${totalStock}</div>
                </div>
            `;
            
            // Show details
            const allResults = [...mainResults, ...subResults];
            if (allResults.length === 0) {
                resultBody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:40px;color:#999;">No stock records found</td></tr>';
            } else {
                resultBody.innerHTML = allResults.map(r => `
                    <tr>
                        <td>${r.code}</td>
                        <td>${r.desc}</td>
                        <td>${r.warehouse}</td>
                        <td class="${r.stock > 10 ? 'stock-good' : r.stock > 0 ? 'stock-low' : 'stock-zero'}">${r.stock}</td>
                        <td><span class="badge ${r.type}">${r.type === 'main' ? 'Main' : 'Substitute'}</span></td>
                    </tr>
                `).join('');
            }
            
            resultCard.classList.add('show');
        }
        
        function showError(msg) {
            const error = document.getElementById('errorMsg');
            error.textContent = msg;
            error.classList.add('show');
        }
        
        function hideError() {
            document.getElementById('errorMsg').classList.remove('show');
        }
        
        // Event bindings
        document.getElementById('searchBtn').addEventListener('click', search);
        document.getElementById('materialCode').addEventListener('keypress', e => {
            if (e.key === 'Enter') search();
        });
        
        // Init
        loadData();
    </script>
</body>
</html>
