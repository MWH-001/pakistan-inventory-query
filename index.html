<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>库存查询系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 1.1em;
        }
        
        .search-card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }
        
        .search-form {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: flex-end;
        }
        
        .form-group {
            flex: 1;
            min-width: 200px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .search-btn {
            padding: 12px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .search-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .result-card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: none;
        }
        
        .result-card.show {
            display: block;
        }
        
        .summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .summary-item {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        
        .summary-item .label {
            color: #666;
            font-size: 14px;
            margin-bottom: 8px;
        }
        
        .summary-item .value {
            font-size: 32px;
            font-weight: bold;
            color: #333;
        }
        
        .summary-item.main .value {
            color: #667eea;
        }
        
        .summary-item.sub .value {
            color: #764ba2;
        }
        
        .summary-item.total .value {
            color: #2ecc71;
        }
        
        .table-section {
            margin-top: 20px;
        }
        
        .table-section h3 {
            margin-bottom: 15px;
            color: #333;
            font-size: 18px;
        }
        
        .table-wrapper {
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }
        
        th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }
        
        td {
            padding: 12px 15px;
            border-bottom: 1px solid #f0f0f0;
        }
        
        tr:hover {
            background: #f8f9fa;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .badge.main {
            background: #667eea;
            color: white;
        }
        
        .badge.sub {
            background: #764ba2;
            color: white;
        }
        
        .stock-good {
            color: #2ecc71;
            font-weight: 600;
        }
        
        .stock-low {
            color: #f39c12;
            font-weight: 600;
        }
        
        .stock-zero {
            color: #e74c3c;
            font-weight: 600;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .loading::after {
            content: '...';
            animation: dots 1.5s steps(5, end) infinite;
        }
        
        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60% { content: '...'; }
            80%, 100% { content: ''; }
        }
        
        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }
        
        .error.show {
            display: block;
        }
        
        .update-time {
            text-align: center;
            color: rgba(255,255,255,0.8);
            margin-top: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📦 库存查询系统</h1>
            <p>查询物料及替代料在指定仓库的 Good 库存</p>
        </div>
        
        <div class="search-card">
            <div class="search-form">
                <div class="form-group">
                    <label>物料编码</label>
                    <input type="text" id="materialCode" placeholder="输入8位物料编码，如 17401967">
                </div>
                <div class="form-group">
                    <label>仓库名称</label>
                    <select id="warehouse">
                        <option value="">全部仓库</option>
                    </select>
                </div>
                <button class="search-btn" id="searchBtn">查询</button>
            </div>
            <div class="error" id="errorMsg"></div>
        </div>
        
        <div class="result-card" id="resultCard">
            <div class="summary" id="summary"></div>
            
            <div class="table-section">
                <h3>库存明细</h3>
                <div class="table-wrapper">
                    <table id="resultTable">
                        <thead>
                            <tr>
                                <th>物料编码</th>
                                <th>描述</th>
                                <th>仓库</th>
                                <th>Good 库存</th>
                                <th>类型</th>
                            </tr>
                        </thead>
                        <tbody id="resultBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
        
        <div class="update-time" id="updateTime"></div>
    </div>
    
    <script>
        let inventoryData = null;
        let substituteData = null;
        
        // 加载数据
        async function loadData() {
            try {
                const [invRes, subRes] = await Promise.all([
                    fetch('inventory_index.json?t=' + Date.now()),
                    fetch('substitute_map.json?t=' + Date.now())
                ]);
                
                if (!invRes.ok || !subRes.ok) {
                    throw new Error('数据加载失败');
                }
                
                inventoryData = await invRes.json();
                substituteData = await subRes.json();
                
                // 更新仓库列表
                const warehouses = new Set();
                Object.values(inventoryData).forEach(warehousesObj => {
                    Object.keys(warehousesObj).forEach(wh => warehouses.add(wh));
                });
                
                const warehouseSelect = document.getElementById('warehouse');
                Array.from(warehouses).sort().forEach(wh => {
                    const option = document.createElement('option');
                    option.value = wh;
                    option.textContent = wh;
                    warehouseSelect.appendChild(option);
                });
                
                // 显示更新时间
                const now = new Date();
                document.getElementById('updateTime').textContent = 
                    `数据更新时间：${now.toLocaleString('zh-CN')}`;
                
            } catch (error) {
                showError('数据加载失败，请稍后重试');
            }
        }
        
        // 查询
        async function search() {
            const materialCode = document.getElementById('materialCode').value.trim();
            const warehouse = document.getElementById('warehouse').value;
            
            if (!materialCode) {
                showError('请输入物料编码');
                return;
            }
            
            hideError();
            
            const resultCard = document.getElementById('resultCard');
            const summary = document.getElementById('summary');
            const resultBody = document.getElementById('resultBody');
            
            resultCard.classList.remove('show');
            summary.innerHTML = '<div class="loading">查询中</div>';
            resultBody.innerHTML = '';
            
            // 模拟异步查询
            await new Promise(resolve => setTimeout(resolve, 100));
            
            // 查询主物料
            let mainStock = 0;
            const mainResults = [];
            
            if (inventoryData[materialCode]) {
                if (warehouse) {
                    const stock = inventoryData[materialCode][warehouse]?.Good || 0;
                    mainStock = stock;
                    if (stock > 0) {
                        mainResults.push({
                            code: materialCode,
                            desc: '主物料',
                            warehouse: warehouse,
                            stock: stock,
                            type: 'main'
                        });
                    }
                } else {
                    // 全部仓库
                    Object.entries(inventoryData[materialCode]).forEach(([wh, data]) => {
                        const stock = data.Good || 0;
                        mainStock += stock;
                        if (stock > 0) {
                            mainResults.push({
                                code: materialCode,
                                desc: '主物料',
                                warehouse: wh,
                                stock: stock,
                                type: 'main'
                            });
                        }
                    });
                }
            }
            
            // 查询替代料
            let subStock = 0;
            const subResults = [];
            
            if (substituteData[materialCode]) {
                for (const sub of substituteData[materialCode]) {
                    const subCode = sub.code;
                    const subDesc = sub.desc || '';
                    
                    if (inventoryData[subCode]) {
                        if (warehouse) {
                            const stock = inventoryData[subCode][warehouse]?.Good || 0;
                            subStock += stock;
                            if (stock > 0) {
                                subResults.push({
                                    code: subCode,
                                    desc: subDesc,
                                    warehouse: warehouse,
                                    stock: stock,
                                    type: 'sub'
                                });
                            }
                        } else {
                            Object.entries(inventoryData[subCode]).forEach(([wh, data]) => {
                                const stock = data.Good || 0;
                                subStock += stock;
                                if (stock > 0) {
                                    subResults.push({
                                        code: subCode,
                                        desc: subDesc,
                                        warehouse: wh,
                                        stock: stock,
                                        type: 'sub'
                                    });
                                }
                            });
                        }
                    }
                }
            }
            
            const totalStock = mainStock + subStock;
            
            // 显示汇总
            summary.innerHTML = `
                <div class="summary-item main">
                    <div class="label">主物料库存</div>
                    <div class="value">${mainStock}</div>
                </div>
                <div class="summary-item sub">
                    <div class="label">替代料库存</div>
                    <div class="value">${subStock}</div>
                </div>
                <div class="summary-item total">
                    <div class="label">总库存</div>
                    <div class="value">${totalStock}</div>
                </div>
            `;
            
            // 显示明细
            const allResults = [...mainResults, ...subResults];
            if (allResults.length === 0) {
                resultBody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:40px;color:#999;">未找到库存记录</td></tr>';
            } else {
                resultBody.innerHTML = allResults.map(r => `
                    <tr>
                        <td>${r.code}</td>
                        <td>${r.desc}</td>
                        <td>${r.warehouse}</td>
                        <td class="${r.stock > 10 ? 'stock-good' : r.stock > 0 ? 'stock-low' : 'stock-zero'}">${r.stock}</td>
                        <td><span class="badge ${r.type}">${r.type === 'main' ? '主物料' : '替代料'}</span></td>
                    </tr>
                `).join('');
            }
            
            resultCard.classList.add('show');
        }
        
        function showError(msg) {
            const error = document.getElementById('errorMsg');
            error.textContent = msg;
            error.classList.add('show');
        }
        
        function hideError() {
            document.getElementById('errorMsg').classList.remove('show');
        }
        
        // 事件绑定
        document.getElementById('searchBtn').addEventListener('click', search);
        document.getElementById('materialCode').addEventListener('keypress', e => {
            if (e.key === 'Enter') search();
        });
        
        // 初始化
        loadData();
    </script>
</body>
</html>
